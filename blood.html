<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Donors - Life Saver</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0a1941; }
        .donor-card { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
        .spinner { display:inline-block; width:20px; height:20px; border:3px solid rgba(255,255,255,0.3); border-top-color:white; border-radius:50%; animation:spin 0.7s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>
</head>
<body class="text-white min-h-screen p-6">

<div class="max-w-5xl mx-auto">

    <!-- Back -->
    <a href="index.html" class="inline-flex items-center gap-2 text-green-400 hover:text-green-300 transition mb-6">
        ← Back to Home
    </a>

    <!-- Header -->
    <div class="mb-8">
        <h1 class="text-3xl font-bold">🩸 Available Blood Donors</h1>
        <p class="text-gray-400 mt-1">Find verified donors near you by blood group and city</p>
    </div>

    <!-- Filter Bar -->
    <div class="bg-white rounded-xl p-4 flex flex-wrap gap-3 mb-8 shadow-xl">
        <select id="bgFilter" class="bg-gray-100 text-black p-3 rounded-lg flex-1 min-w-[140px] font-semibold outline-none focus:ring-2 focus:ring-red-400">
            <option value="All">All Blood Groups</option>
            <option>O+</option>
            <option>O-</option>
            <option>A+</option>
            <option>A-</option>
            <option>B+</option>
            <option>B-</option>
            <option>AB+</option>
            <option>AB-</option>
        </select>
        <select id="cityFilter" class="bg-gray-100 text-black p-3 rounded-lg flex-1 min-w-[140px] font-semibold outline-none focus:ring-2 focus:ring-red-400">
            <option value="All">All Cities</option>
            <option>Hyderabad</option>
            <option>Warangal</option>
            <option>Karimnagar</option>
            <option>Nizamabad</option>
            <option>Khammam</option>
            <option>Mahabubnagar</option>
            <option>Nalgonda</option>
            <option>Adilabad</option>
        </select>
        <button id="searchBtn" onclick="fetchDonors()"
            class="bg-red-600 hover:bg-red-700 text-white px-8 py-3 rounded-lg font-bold transition flex items-center gap-2">
            🔍 Search
        </button>
    </div>

    <!-- Results count -->
    <div id="resultCount" class="text-gray-400 text-sm mb-4 hidden">
        Showing <span id="countNum" class="text-white font-bold">0</span> donors
    </div>

    <!-- Donors Grid -->
    <div id="donorsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>

</div>

<!-- ✅ Firebase loaded as regular CDN scripts (no module needed for basic usage) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    // Firebase init using compat SDK (no import/module needed — works on GitHub Pages perfectly)
    var firebaseConfig = {
        apiKey:            "AIzaSyD9qUADNpQwX5iFp_qELRSGhHFswi-NoBc",
        authDomain:        "life-saver-be5cf.firebaseapp.com",
        databaseURL:       "https://life-saver-be5cf-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId:         "life-saver-be5cf",
        storageBucket:     "life-saver-be5cf.firebasestorage.app",
        messagingSenderId: "549675407162",
        appId:             "1:549675407162:web:ba3c8878834cb4123ba203"
    };

    firebase.initializeApp(firebaseConfig);
    var db = firebase.database();

    // Read URL params (from homepage search)
    var params  = new URLSearchParams(window.location.search);
    var paramBG   = params.get('bg');
    var paramCity = params.get('city');
    if (paramBG) {
        var bgOpts = document.getElementById('bgFilter').options;
        for (var i = 0; i < bgOpts.length; i++) {
            if (bgOpts[i].value.toLowerCase() === paramBG.toLowerCase()) {
                document.getElementById('bgFilter').selectedIndex = i;
                break;
            }
        }
    }
    if (paramCity) {
        var cityOpts = document.getElementById('cityFilter').options;
        for (var j = 0; j < cityOpts.length; j++) {
            if (cityOpts[j].value.toLowerCase() === paramCity.toLowerCase()) {
                document.getElementById('cityFilter').selectedIndex = j;
                break;
            }
        }
    }

    // Fetch donors
    function fetchDonors() {
        var bgFilter   = document.getElementById('bgFilter').value;
        var cityFilter = document.getElementById('cityFilter').value;
        var grid       = document.getElementById('donorsGrid');
        var countDiv   = document.getElementById('resultCount');
        var countNum   = document.getElementById('countNum');
        var btn        = document.getElementById('searchBtn');

        // Loading state
        btn.innerHTML  = '<span class="spinner"></span> Searching...';
        btn.disabled   = true;
        grid.innerHTML = '<div class="col-span-full flex justify-center py-16"><span class="spinner" style="width:36px;height:36px;border-width:4px;"></span></div>';
        countDiv.classList.add('hidden');

        db.ref('donors').once('value', function(snapshot) {
            btn.innerHTML = '🔍 Search';
            btn.disabled  = false;

            var data = snapshot.val();

            if (!data) {
                grid.innerHTML = "<div class='col-span-full text-center py-16 text-gray-400'><div class='text-5xl mb-4'>🩸</div><p class='text-lg font-semibold'>No donors registered yet.</p><p class='text-sm mt-1'>Be the first — <a href='auth.html' class='text-green-400 underline'>Register as a donor</a></p></div>";
                return;
            }

            var donors  = Object.values(data);
            var filtered = donors.filter(function(d) {
                var bgMatch   = bgFilter === 'All'   || d.bloodGroup === bgFilter;
                var cityMatch = cityFilter === 'All' || (d.city && d.city.toLowerCase() === cityFilter.toLowerCase());
                return bgMatch && cityMatch;
            });

            if (filtered.length === 0) {
                grid.innerHTML = "<div class='col-span-full text-center py-16 text-gray-400'><div class='text-5xl mb-4'>😔</div><p class='text-lg font-semibold'>No donors found for this filter.</p><p class='text-sm mt-1'>Try a different blood group or city.</p></div>";
                countDiv.classList.add('hidden');
                return;
            }

            countNum.textContent = filtered.length;
            countDiv.classList.remove('hidden');

            grid.innerHTML = filtered.map(function(donor) {
                var statusColor = donor.status === 'Available' ? 'bg-green-500' : 'bg-gray-500';
                var statusText  = donor.status || 'Available';
                return '<div class="donor-card bg-gray-800 p-6 rounded-xl border border-gray-700 hover:border-red-500 transition">' +
                    '<div class="flex justify-between items-start">' +
                        '<div>' +
                            '<h3 class="text-xl font-bold text-white">' + escHtml(donor.name) + '</h3>' +
                            '<div class="flex flex-wrap items-center gap-2 mt-2">' +
                                '<span class="bg-red-700 text-red-100 px-3 py-1 rounded-full text-xs font-bold">' + escHtml(donor.bloodGroup) + '</span>' +
                                '<span class="text-sm text-gray-400">📍 ' + escHtml(donor.city || '—') + '</span>' +
                            '</div>' +
                        '</div>' +
                        '<span class="' + statusColor + ' text-white text-xs font-bold px-3 py-1 rounded-full">' + escHtml(statusText) + '</span>' +
                    '</div>' +
                    '<div class="mt-4 pt-4 border-t border-gray-700 flex gap-3">' +
                        '<a href="tel:' + escHtml(donor.phone || '') + '" class="flex-1 bg-green-600 hover:bg-green-700 text-white py-2 rounded-lg text-sm font-bold text-center transition">' +
                            '📞 Call Donor' +
                        '</a>' +
                        '<a href="https://wa.me/91' + escHtml(donor.phone || '') + '" target="_blank" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white py-2 rounded-lg text-sm font-bold text-center transition">' +
                            '💬 WhatsApp' +
                        '</a>' +
                    '</div>' +
                '</div>';
            }).join('');

        }, function(error) {
            btn.innerHTML = '🔍 Search';
            btn.disabled  = false;
            grid.innerHTML = "<div class='col-span-full text-center py-16 text-red-400'><p class='text-lg font-semibold'>❌ Failed to load donors.</p><p class='text-sm mt-1'>Check your internet connection and try again.</p></div>";
            console.error('Firebase error:', error);
        });
    }

    // Escape HTML to prevent XSS
    function escHtml(str) {
        if (!str) return '';
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    // Load on page open
    fetchDonors();

    lucide.createIcons();
</script>

</body>
</html>
