<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Become a Donor - LifeSaver</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
    :root {
      --red: #e63946;
      --red-dark: #c1121f;
      --green: #2dc653;
      --bg: #0d0d0d;
      --card: #161616;
      --border: #2a2a2a;
      --text: #f1f1f1;
      --muted: #888;
    }
    body {
      font-family: 'Sora', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 30px 20px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      font-size: 2.4rem;
      margin-bottom: 12px;
      color: #fff;
    }
    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 1.1rem;
      margin-bottom: 40px;
    }
    .heart {
      color: #ff4d6d;
      font-size: 2.8rem;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      margin-bottom: 40px;
    }
    .step-progress {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .step-dot {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #2a2a2a;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.1rem;
      transition: all 0.3s;
    }
    .step-dot.active {
      background: var(--red);
      color: white;
      box-shadow: 0 0 16px rgba(230,57,70,0.5);
    }
    .step-dot.done {
      background: var(--green);
      color: black;
    }
    .step-line {
      height: 3px;
      flex: 1;
      max-width: 80px;
      background: #2a2a2a;
      align-self: center;
      border-radius: 2px;
    }
    .step-line.done {
      background: var(--green);
    }
    .step { display: none; }
    .step.active { display: block; animation: fadeIn 0.4s; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .field {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }
    input, select {
      width: 100%;
      padding: 12px 16px;
      background: #1e1e1e;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: white;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(230,57,70,0.2);
    }
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .btn {
      padding: 14px 24px;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.25s;
    }
    .btn-primary {
      background: var(--red);
      color: white;
    }
    .btn-primary:hover {
      background: var(--red-dark);
      transform: translateY(-2px);
    }
    .btn-green {
      background: var(--green);
      color: black;
    }
    .btn-green:hover {
      background: #25a845;
      transform: translateY(-2px);
    }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: white;
    }
    .btn-outline:hover {
      background: #1e1e1e;
    }
    .row-btns {
      display: flex;
      gap: 16px;
      margin-top: 24px;
    }
    .msg {
      margin-top: 12px;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.95rem;
    }
    .msg.success { background: rgba(45,198,83,0.15); color: var(--green); }
    .msg.error   { background: rgba(230,57,70,0.15); color: #ff7582; }
    .strength-bar {
      height: 4px;
      background: #2a2a2a;
      border-radius: 2px;
      margin-top: 6px;
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      width: 0%;
      transition: width 0.4s, background 0.4s;
    }
    .match-msg {
      font-size: 0.85rem;
      margin-top: 6px;
    }
    @media (max-width: 600px) {
      .grid-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="container">

  <h1><span class="heart">♥</span> Become a Life Saver</h1>
  <p class="subtitle">Register as a blood donor and help save lives in Hyderabad and nearby areas</p>

  <div class="card">

    <!-- Step Progress -->
    <div class="step-progress">
      <div class="step-dot active" id="dot1">1</div>
      <div class="step-line" id="line1"></div>
      <div class="step-dot" id="dot2">2</div>
      <div class="step-line" id="line2"></div>
      <div class="step-dot" id="dot3">3</div>
    </div>

    <!-- STEP 1: Personal Details -->
    <div class="step active" id="step1">
      <div class="field">
        <label>Full Name *</label>
        <input type="text" id="fullName" placeholder="Enter your full name" required/>
      </div>

      <div class="grid-2">
        <div class="field">
          <label>Gender *</label>
          <select id="gender" required>
            <option value="">Select gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="field">
          <label>Date of Birth *</label>
          <input type="date" id="dob" required/>
        </div>
      </div>

      <div class="grid-2">
        <div class="field">
          <label>Blood Group *</label>
          <select id="bloodGroup" required>
            <option value="">Select blood group</option>
            <option>O+</option><option>O-</option>
            <option>A+</option><option>A-</option>
            <option>B+</option><option>B-</option>
            <option>AB+</option><option>AB-</option>
          </select>
        </div>
        <div class="field">
          <label>Weight (kg) *</label>
          <input type="number" id="weight" min="45" placeholder="Minimum 45 kg" required/>
        </div>
      </div>

      <div class="field">
        <label>City / Area *</label>
        <select id="city" required>
          <option value="">Select your city/area</option>
          <option>Hyderabad</option><option>Secunderabad</option>
          <option>Warangal</option><option>Karimnagar</option>
          <option>Nizamabad</option><option>Khammam</option>
          <option>Mahabubnagar</option><option>Nalgonda</option>
          <option>Other (Telangana)</option>
        </select>
      </div>

      <div style="text-align:right; margin-top:24px;">
        <button class="btn btn-primary" id="next1">Continue →</button>
      </div>
    </div>

    <!-- STEP 2: Contact & Health -->
    <div class="step" id="step2">
      <div class="field">
        <label>Mobile Number *</label>
        <input type="tel" id="phone" placeholder="10-digit number (without +91)" maxlength="10" required/>
      </div>

      <div class="field">
        <label>Email Address *</label>
        <input type="email" id="email" placeholder="you@example.com" required/>
      </div>

      <div class="field">
        <label>When did you last donate blood? (if ever)</label>
        <input type="date" id="lastDonation"/>
        <p style="font-size:0.85rem; color:var(--muted); margin-top:6px;">
          (We recommend at least 3 months gap for men, 4 months for women)
        </p>
      </div>

      <div class="field">
        <label>Any medical conditions we should know? (optional)</label>
        <textarea id="medicalNotes" rows="3" placeholder="e.g. diabetes, BP, recent surgery, medications..."></textarea>
      </div>

      <div class="row-btns">
        <button class="btn btn-outline" id="back2">← Back</button>
        <button class="btn btn-primary" id="next2">Continue →</button>
      </div>
    </div>

    <!-- STEP 3: Account & Password -->
    <div class="step" id="step3">
      <div class="field">
        <label>Create Password *</label>
        <input type="password" id="password" placeholder="Minimum 6 characters" required/>
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <div id="strengthLabel" style="font-size:0.85rem; color:var(--muted); text-align:right; margin-top:4px;">No password</div>
      </div>

      <div class="field">
        <label>Confirm Password *</label>
        <input type="password" id="confirmPassword" required/>
        <div id="matchMsg" class="match-msg"></div>
      </div>

      <div class="field" style="font-size:0.9rem; color:var(--muted);">
        <label style="display:inline; text-transform:none; font-weight:normal;">
          <input type="checkbox" id="agree" required/> I agree to the terms & confirm I am eligible to donate blood
        </label>
      </div>

      <div class="row-btns">
        <button class="btn btn-outline" id="back3">← Back</button>
        <button class="btn btn-green" id="submitDonor">🩸 Register as Donor</button>
      </div>

      <div id="registerMsg" class="msg"></div>
    </div>

  </div>

</div>

<script>
// Step navigation
const steps = document.querySelectorAll('.step');
const dots = document.querySelectorAll('.step-dot');
const lines = document.querySelectorAll('.step-line');

function goToStep(n) {
  steps.forEach((s,i) => s.classList.toggle('active', i === n-1));
  dots.forEach((d,i) => {
    d.classList.toggle('active', i === n-1);
    d.classList.toggle('done', i < n-1);
  });
  lines.forEach((l,i) => l.classList.toggle('done', i < n-1));
}

document.getElementById('next1').onclick = () => {
  if (!document.getElementById('fullName').value.trim() ||
      !document.getElementById('gender').value ||
      !document.getElementById('dob').value ||
      !document.getElementById('bloodGroup').value ||
      !document.getElementById('weight').value ||
      !document.getElementById('city').value) {
    alert("Please fill all required fields in Step 1");
    return;
  }
  goToStep(2);
};

document.getElementById('next2').onclick = () => {
  if (!document.getElementById('phone').value.trim() ||
      !document.getElementById('email').value.trim()) {
    alert("Please fill mobile and email");
    return;
  }
  goToStep(3);
};

document.getElementById('back2').onclick = () => goToStep(1);
document.getElementById('back3').onclick = () => goToStep(2);

// Password strength & match
const pw = document.getElementById('password');
const cpw = document.getElementById('confirmPassword');
const fill = document.getElementById('strengthFill');
const label = document.getElementById('strengthLabel');
const match = document.getElementById('matchMsg');

pw.addEventListener('input', () => {
  const v = pw.value;
  let score = 0;
  if (v.length >= 6) score += 30;
  if (/[a-z]/.test(v) && /[A-Z]/.test(v)) score += 25;
  if (/\d/.test(v)) score += 20;
  if (/[^a-zA-Z\d]/.test(v)) score += 25;

  fill.style.width = score + '%';
  fill.style.background = score < 40 ? '#ff7582' : score < 70 ? '#ffaa00' : '#2dc653';
  label.textContent = score === 0 ? 'No password' : score < 40 ? 'Weak' : score < 70 ? 'Medium' : 'Strong';
});

cpw.addEventListener('input', () => {
  if (pw.value && cpw.value) {
    const ok = pw.value === cpw.value;
    match.textContent = ok ? 'Passwords match ✓' : 'Passwords do not match ✗';
    match.style.color = ok ? 'var(--green)' : '#ff7582';
  } else {
    match.textContent = '';
  }
});

// Submit (you can connect to Firebase here later)
document.getElementById('submitDonor').onclick = () => {
  const agree = document.getElementById('agree').checked;
  if (!agree) return alert("Please agree to the terms");

  if (pw.value !== cpw.value) return alert("Passwords do not match");

  const data = {
    name: document.getElementById('fullName').value.trim(),
    gender: document.getElementById('gender').value,
    dob: document.getElementById('dob').value,
    bloodGroup: document.getElementById('bloodGroup').value,
    weight: document.getElementById('weight').value,
    city: document.getElementById('city').value,
    phone: document.getElementById('phone').value.trim(),
    email: document.getElementById('email').value.trim(),
    lastDonation: document.getElementById('lastDonation').value || null,
    notes: document.getElementById('medicalNotes').value.trim(),
    registeredAt: new Date().toISOString()
  };

  alert("Thank you! Your donor registration has been submitted.\n\n(You can connect this to Firebase / backend now)");

  // Example: console.log(data);
  // Here you would normally do: createUserWithEmailAndPassword(...) + save to database
  // window.location.href = "index.html";
};

</script>
</body>
</html>
