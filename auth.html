<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login / Signup - Blood Donor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #e63946;
    --red-dark: #c1121f;
    --bg: #0d0d0d;
    --card: #161616;
    --border: #2a2a2a;
    --text: #f1f1f1;
    --muted: #888;
    --green: #2dc653;
  }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow: hidden;
  }

  /* Animated background blobs */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.15;
    animation: float 8s ease-in-out infinite;
    pointer-events: none;
    z-index: 0;
  }
  .blob-1 { width: 400px; height: 400px; background: var(--red); top: -100px; left: -100px; animation-delay: 0s; }
  .blob-2 { width: 300px; height: 300px; background: #ff6b6b; bottom: -80px; right: -80px; animation-delay: 3s; }
  .blob-3 { width: 200px; height: 200px; background: var(--red-dark); top: 50%; left: 50%; animation-delay: 5s; }

  @keyframes float {
    0%, 100% { transform: translateY(0px) scale(1); }
    50% { transform: translateY(-30px) scale(1.05); }
  }

  .card {
    position: relative;
    z-index: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.6);
    animation: slideUp 0.5s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
    justify-content: center;
  }

  .logo-icon {
    width: 40px; height: 40px;
    background: var(--red);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    box-shadow: 0 0 20px rgba(230,57,70,0.5);
  }

  .logo span {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  /* Tab switcher */
  .tabs {
    display: flex;
    background: #1e1e1e;
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 28px;
  }

  .tab {
    flex: 1;
    padding: 10px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    font-weight: 600;
    border-radius: 9px;
    cursor: pointer;
    transition: all 0.25s;
  }

  .tab.active {
    background: var(--red);
    color: white;
    box-shadow: 0 4px 15px rgba(230,57,70,0.4);
  }

  /* Form panels */
  .panel { display: none; animation: fadeIn 0.3s ease; }
  .panel.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateX(10px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .field { margin-bottom: 16px; }

  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 6px;
  }

  input {
    width: 100%;
    background: #1e1e1e;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    padding: 12px 14px;
    border-radius: 10px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input:focus {
    border-color: var(--red);
    box-shadow: 0 0 0 3px rgba(230,57,70,0.15);
  }

  input::placeholder { color: #444; }

  .password-wrap {
    position: relative;
  }

  .password-wrap input { padding-right: 44px; }

  .eye-btn {
    position: absolute;
    right: 12px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    padding: 4px;
  }

  .btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-family: 'Sora', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
  }

  .btn-primary {
    background: var(--red);
    color: white;
    box-shadow: 0 4px 20px rgba(230,57,70,0.35);
  }

  .btn-primary:hover {
    background: var(--red-dark);
    transform: translateY(-1px);
    box-shadow: 0 8px 25px rgba(230,57,70,0.45);
  }

  .btn-primary:disabled {
    background: #333;
    color: #666;
    box-shadow: none;
    transform: none;
    cursor: not-allowed;
  }

  /* Forgot password */
  .forgot {
    display: block;
    text-align: right;
    font-size: 12px;
    color: var(--muted);
    text-decoration: none;
    margin-top: -8px;
    margin-bottom: 16px;
    transition: color 0.2s;
    cursor: pointer;
  }
  .forgot:hover { color: var(--red); }

  /* Message box */
  .msg {
    display: none;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 13px;
    font-weight: 500;
    margin-top: 14px;
    line-height: 1.5;
  }
  .msg.error   { background: rgba(230,57,70,0.12); border: 1px solid rgba(230,57,70,0.3); color: #ff6b6b; }
  .msg.success { background: rgba(45,198,83,0.12); border: 1px solid rgba(45,198,83,0.3); color: var(--green); }
  .msg.show { display: block; animation: fadeIn 0.3s ease; }

  /* Password strength */
  .strength-bar {
    height: 3px;
    border-radius: 3px;
    background: #2a2a2a;
    margin-top: 8px;
    overflow: hidden;
  }
  .strength-fill {
    height: 100%;
    width: 0%;
    border-radius: 3px;
    transition: width 0.3s, background 0.3s;
  }
  .strength-label {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    text-align: right;
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
    color: var(--muted);
    font-size: 12px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Google button */
  .btn-google {
    width: 100%;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: transparent;
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all 0.2s;
  }
  .btn-google:hover { background: #1e1e1e; border-color: #444; }

  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Reset password overlay */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(4px);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .overlay.show { display: flex; }
  .overlay-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    width: 100%;
    max-width: 360px;
    animation: slideUp 0.3s ease;
  }
  .overlay-card h3 { font-size: 18px; margin-bottom: 6px; }
  .overlay-card p { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
  .overlay-close {
    position: absolute;
    top: 16px; right: 16px;
    background: none; border: none;
    color: var(--muted); font-size: 20px;
    cursor: pointer; padding: 4px;
  }
  .overlay-card { position: relative; }
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="card">

  <div class="logo">
    <div class="logo-icon">🩸</div>
    <span>LifeSaver</span>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">Login</button>
    <button class="tab" onclick="switchTab('signup')">Sign Up</button>
  </div>

  <!-- LOGIN PANEL -->
  <div class="panel active" id="loginPanel">

    <div class="field">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="yourname@gmail.com">
    </div>

    <div class="field">
      <label>Password</label>
      <div class="password-wrap">
        <input type="password" id="loginPassword" placeholder="Enter your password">
        <button class="eye-btn" onclick="togglePwd('loginPassword', this)">👁</button>
      </div>
    </div>

    <span class="forgot" id="forgotBtn">Forgot password?</span>

    <button class="btn btn-primary" id="loginBtn">Login</button>

    <div class="divider">or</div>

    <button class="btn-google" id="googleBtn">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.2 7.9 3.1l5.7-5.7C34 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.6-.4-3.9z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 16.1 19 13 24 13c3.1 0 5.8 1.2 7.9 3.1l5.7-5.7C34 6.5 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.1l-6.2-5.2C29.4 35.5 26.8 36 24 36c-5.2 0-9.6-3.2-11.3-7.8l-6.5 5C9.5 39.5 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.9 2.4-2.5 4.4-4.6 5.8l6.2 5.2C36.8 36.2 44 31 44 24c0-1.3-.1-2.6-.4-3.9z"/></svg>
      Continue with Google
    </button>

    <div class="msg" id="loginMsg"></div>
  </div>

  <!-- SIGNUP PANEL -->
  <div class="panel" id="signupPanel">

    <div class="field">
      <label>Full Name</label>
      <input type="text" id="signupName" placeholder="Your full name">
    </div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="signupEmail" placeholder="yourname@gmail.com">
    </div>

    <div class="field">
      <label>Password</label>
      <div class="password-wrap">
        <input type="password" id="signupPassword" placeholder="Min. 6 characters" oninput="checkStrength(this.value)">
        <button class="eye-btn" onclick="togglePwd('signupPassword', this)">👁</button>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      <div class="strength-label" id="strengthLabel"></div>
    </div>

    <div class="field">
      <label>Confirm Password</label>
      <div class="password-wrap">
        <input type="password" id="signupConfirm" placeholder="Repeat password">
        <button class="eye-btn" onclick="togglePwd('signupConfirm', this)">👁</button>
      </div>
    </div>

    <button class="btn btn-primary" id="signupBtn">Create Account</button>

    <div class="msg" id="signupMsg"></div>
  </div>

</div>

<!-- FORGOT PASSWORD OVERLAY -->
<div class="overlay" id="resetOverlay">
  <div class="overlay-card">
    <button class="overlay-close" id="closeResetBtn">✕</button>
    <h3>Reset Password</h3>
    <p>Enter your email and we'll send you a reset link.</p>
    <div class="field">
      <label>Email</label>
      <input type="email" id="resetEmail" placeholder="yourname@gmail.com">
    </div>
    <button class="btn btn-primary" id="sendResetBtn">Send Reset Link</button>
    <div class="msg" id="resetMsg"></div>
  </div>
</div>


<script type="module">
import { initializeApp }          from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getDatabase, ref, set }  from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  sendPasswordResetEmail,
  GoogleAuthProvider,
  signInWithPopup,
  updateProfile
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyD9qUADNpQwX5iFp_qELRSGhHFswi-NoBc",
  authDomain: "life-saver-be5cf.firebaseapp.com",
  databaseURL: "https://life-saver-be5cf-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "life-saver-be5cf",
  storageBucket: "life-saver-be5cf.firebasestorage.app",
  messagingSenderId: "549675407162",
  appId: "1:549675407142:web:ba3c8878834cb4123ba203"
};

const app      = initializeApp(firebaseConfig);
const auth     = getAuth(app);
const db       = getDatabase(app);
const provider = new GoogleAuthProvider();

/* ---- helpers ---- */
function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = `msg ${type} show`;
}

function setLoading(btnId, label, loading) {
  const btn = document.getElementById(btnId);
  if (loading) {
    btn.innerHTML = `<span class="spinner"></span> Please wait...`;
    btn.disabled = true;
  } else {
    btn.innerHTML = label;
    btn.disabled = false;
  }
}

function checkStrength(val) {
  const fill  = document.getElementById('strengthFill');
  const label = document.getElementById('strengthLabel');
  let score = 0;
  if (val.length >= 6)  score++;
  if (val.length >= 10) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  const levels = [
    { w: '20%', c: '#e63946', t: 'Very Weak' },
    { w: '40%', c: '#ff6b35', t: 'Weak' },
    { w: '60%', c: '#f7c59f', t: 'Fair' },
    { w: '80%', c: '#a8dadc', t: 'Strong' },
    { w: '100%', c: '#2dc653', t: 'Very Strong' },
  ];
  const l = levels[Math.max(0, score - 1)] || levels[0];
  fill.style.width = val ? l.w : '0%';
  fill.style.background = l.c;
  label.textContent = val ? l.t : '';
  label.style.color = l.c;
}

/* ---- SIGNUP ---- */
async function signupUser() {
  const name     = document.getElementById('signupName').value.trim();
  const email    = document.getElementById('signupEmail').value.trim();
  const password = document.getElementById('signupPassword').value;
  const confirm  = document.getElementById('signupConfirm').value;

  if (!name || !email || !password || !confirm)
    return showMsg('signupMsg', '⚠️ Please fill in all fields.', 'error');
  if (password.length < 6)
    return showMsg('signupMsg', '⚠️ Password must be at least 6 characters.', 'error');
  if (password !== confirm)
    return showMsg('signupMsg', '⚠️ Passwords do not match.', 'error');

  setLoading('signupBtn', 'Create Account', true);
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    await updateProfile(cred.user, { displayName: name });
    await set(ref(db, 'users/' + cred.user.uid), {
      name, email, createdAt: new Date().toISOString()
    });
    showMsg('signupMsg', '✅ Account created successfully! Redirecting...', 'success');
    setTimeout(() => window.location.href = 'register.html', 1800);
  } catch (err) {
    const msgs = {
      'auth/email-already-in-use': '⚠️ This email is already registered. Try logging in.',
      'auth/invalid-email':        '⚠️ Invalid email address.',
      'auth/weak-password':        '⚠️ Password is too weak.',
    };
    showMsg('signupMsg', msgs[err.code] || '❌ ' + err.message, 'error');
  } finally {
    setLoading('signupBtn', 'Create Account', false);
  }
}

/* ---- LOGIN ---- */
async function loginUser() {
  const email    = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;

  if (!email || !password)
    return showMsg('loginMsg', '⚠️ Please enter your email and password.', 'error');

  setLoading('loginBtn', 'Login', true);
  try {
    await signInWithEmailAndPassword(auth, email, password);
    showMsg('loginMsg', '✅ Login successful! Redirecting...', 'success');
    setTimeout(() => window.location.href = 'register.html', 1500);
  } catch (err) {
    const msgs = {
      'auth/user-not-found':     '⚠️ No account found with this email.',
      'auth/wrong-password':     '⚠️ Incorrect password. Try again.',
      'auth/invalid-credential': '⚠️ Invalid email or password.',
      'auth/too-many-requests':  '⚠️ Too many attempts. Please wait a moment.',
    };
    showMsg('loginMsg', msgs[err.code] || '❌ ' + err.message, 'error');
  } finally {
    setLoading('loginBtn', 'Login', false);
  }
}

/* ---- GOOGLE LOGIN ---- */
async function loginGoogle() {
  try {
    const result = await signInWithPopup(auth, provider);
    const user   = result.user;
    await set(ref(db, 'users/' + user.uid), {
      name: user.displayName, email: user.email,
      photo: user.photoURL, createdAt: new Date().toISOString()
    });
    showMsg('loginMsg', '✅ Google login successful! Redirecting...', 'success');
    setTimeout(() => window.location.href = 'register.html', 1500);
  } catch (err) {
    showMsg('loginMsg', '❌ Google login failed: ' + err.message, 'error');
  }
}

/* ---- FORGOT PASSWORD ---- */
function openReset()  { document.getElementById('resetOverlay').classList.add('show'); }
function closeReset() { document.getElementById('resetOverlay').classList.remove('show'); }

async function sendReset() {
  const email = document.getElementById('resetEmail').value.trim();
  if (!email) return showMsg('resetMsg', '⚠️ Enter your email.', 'error');
  try {
    await sendPasswordResetEmail(auth, email);
    showMsg('resetMsg', '✅ Reset link sent! Check your inbox.', 'success');
  } catch (err) {
    showMsg('resetMsg', '❌ ' + err.message, 'error');
  }
}

/* ---- TAB SWITCH ---- */
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (tab==='login'?i===0:i===1)));
  document.getElementById('loginPanel').classList.toggle('active', tab==='login');
  document.getElementById('signupPanel').classList.toggle('active', tab==='signup');
}

/* ---- WIRE UP ALL BUTTONS via addEventListener ---- */
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('loginBtn').addEventListener('click', loginUser);
  document.getElementById('signupBtn').addEventListener('click', signupUser);
  document.getElementById('googleBtn').addEventListener('click', loginGoogle);
  document.getElementById('forgotBtn').addEventListener('click', openReset);
  document.getElementById('closeResetBtn').addEventListener('click', closeReset);
  document.getElementById('sendResetBtn').addEventListener('click', sendReset);

  // Tab buttons
  document.querySelectorAll('.tab').forEach((btn, i) => {
    btn.addEventListener('click', () => switchTab(i === 0 ? 'login' : 'signup'));
  });

  // Password strength
  document.getElementById('signupPassword').addEventListener('input', function() {
    checkStrength(this.value);
  });

  // Toggle password eyes
  document.querySelectorAll('.eye-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      const input = this.previousElementSibling;
      input.type = input.type === 'password' ? 'text' : 'password';
      this.textContent = input.type === 'password' ? '👁' : '🙈';
    });
  });
});
</script>

</body>
</html>
