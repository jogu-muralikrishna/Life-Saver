<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Donate Organs & Body Parts</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- EmailJS -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>
        emailjs.init("YOUR_PUBLIC_KEY"); 
        // Replace with your EmailJS Public Key
    </script>
</head>

<body class="bg-gray-50 pb-20">

<div class="max-w-3xl mx-auto p-6">

    <header class="mb-8">
        <a href="index.html" class="text-purple-600 flex items-center gap-1 mb-4">
            <i data-lucide="arrow-left" size="16"></i> Back to Home
        </a>

        <h1 class="text-3xl font-bold text-gray-900">
            Donate Organs & Body Parts
        </h1>

        <div class="mt-6 bg-purple-100 border border-purple-200 rounded-xl p-5">
            <p class="text-purple-800 font-semibold">
                Make a Difference
            </p>
            <p class="text-purple-700 text-sm mt-1">
                One person can save up to 8 lives through organ donation.
            </p>
        </div>
    </header>

    <form id="organForm" class="bg-white rounded-2xl shadow-lg p-8 space-y-8">

        <!-- Basic Info -->
        <section>
            <h2 class="text-xl font-bold text-purple-700 mb-4">
                1. Basic Information
            </h2>

            <div class="space-y-4">
                <input type="text" id="name" placeholder="Full Name"
                    required class="w-full p-3 border rounded-lg">

                <div class="grid grid-cols-2 gap-4">
                    <input type="tel" id="mobile"
                        placeholder="10-digit mobile number"
                        required class="p-3 border rounded-lg">

                    <input type="number" id="age"
                        placeholder="Age"
                        required class="p-3 border rounded-lg">
                </div>

                <input type="text" id="address"
                    placeholder="City, Area, Postal Code"
                    required class="w-full p-3 border rounded-lg">
            </div>
        </section>

        <!-- Email Verification -->
        <section>
            <h2 class="text-xl font-bold text-purple-700 mb-4">
                2. Email Verification
            </h2>

            <div class="flex gap-2">
                <input type="email" id="email"
                    placeholder="Enter your email"
                    required class="flex-1 p-3 border rounded-lg">

                <button type="button" id="sendOtpBtn"
                    class="bg-blue-600 text-white px-4 rounded-lg font-bold text-sm">
                    Send OTP
                </button>
            </div>

            <div id="otpBox" class="hidden mt-4">
                <div class="flex gap-2">
                    <input type="text" id="otpInput"
                        placeholder="Enter 6-digit OTP"
                        class="flex-1 p-3 border-2 border-blue-400 rounded-lg text-center font-bold">

                    <button type="button" id="verifyBtn"
                        class="bg-green-600 text-white px-6 rounded-lg font-bold">
                        Verify
                    </button>
                </div>
            </div>
        </section>

        <!-- Organ Selection -->
        <section>
            <h2 class="text-xl font-bold text-purple-700 mb-4">
                3. Select Organs to Donate
            </h2>

            <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
                <label><input type="checkbox" name="organs" value="Heart"> Heart</label>
                <label><input type="checkbox" name="organs" value="Liver"> Liver</label>
                <label><input type="checkbox" name="organs" value="Kidneys"> Kidneys</label>
                <label><input type="checkbox" name="organs" value="Lungs"> Lungs</label>
                <label><input type="checkbox" name="organs" value="Corneas"> Corneas</label>
                <label><input type="checkbox" name="organs" value="Skin"> Skin</label>
            </div>
        </section>

        <!-- Consent -->
        <section class="bg-purple-50 p-4 rounded-lg">
            <label class="flex items-start gap-3">
                <input type="checkbox" required>
                <span class="text-sm text-purple-900">
                    I confirm that the information provided is accurate and
                    I consent to organ donation.
                </span>
            </label>
        </section>

        <!-- Submit -->
        <button type="submit" id="submitBtn" disabled
            class="w-full bg-gray-400 text-white py-4 rounded-xl font-bold cursor-not-allowed">
            Register as Organ Donor
        </button>

    </form>
</div>

<!-- Firebase + Logic -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "YOUR_FIREBASE_API_KEY",
    authDomain: "YOUR_FIREBASE_AUTH_DOMAIN",
    databaseURL: "YOUR_FIREBASE_DATABASE_URL",
    projectId: "YOUR_FIREBASE_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let generatedOTP;
let isVerified = false;

/* SEND OTP */
document.getElementById("sendOtpBtn").addEventListener("click", function () {

    const email = document.getElementById("email").value;
    const name = document.getElementById("name").value;

    if (!email || !name) {
        alert("Enter Name and Email First");
        return;
    }

    generatedOTP = Math.floor(100000 + Math.random() * 900000);

    const params = {
        user_name: name,
        user_email: email,
        otp_code: generatedOTP
    };

    emailjs.send("YOUR_SERVICE_ID", "YOUR_TEMPLATE_ID", params)
        .then(() => {
            alert("OTP Sent Successfully");
            document.getElementById("otpBox").classList.remove("hidden");
        })
        .catch(error => {
            alert("Email Error: " + error.text);
        });
});

/* VERIFY OTP */
document.getElementById("verifyBtn").addEventListener("click", function () {

    if (document.getElementById("otpInput").value == generatedOTP) {

        isVerified = true;
        alert("Verification Successful");

        const btn = document.getElementById("submitBtn");
        btn.disabled = false;
        btn.classList.remove("bg-gray-400", "cursor-not-allowed");
        btn.classList.add("bg-purple-600");

        document.getElementById("otpBox").classList.add("hidden");

    } else {
        alert("Invalid OTP");
    }
});

/* SUBMIT */
document.getElementById("organForm").addEventListener("submit", function(e){

    e.preventDefault();

    if (!isVerified) {
        alert("Please verify your email first");
        return;
    }

    const selectedOrgans = Array.from(
        document.querySelectorAll('input[name="organs"]:checked')
    ).map(cb => cb.value);

    const data = {
        fullName: document.getElementById("name").value,
        mobile: document.getElementById("mobile").value,
        age: document.getElementById("age").value,
        address: document.getElementById("address").value,
        email: document.getElementById("email").value,
        organs: selectedOrgans,
        verified: "Email",
        timestamp: new Date().toISOString()
    };

    push(ref(db, "organ_registry"), data)
        .then(() => {
            alert("Thank you for your noble pledge!");
            window.location.href = "index.html";
        });
});

lucide.createIcons();

</script>

</body>
</html>
