<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register - Verified Blood Donor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script>
emailjs.init("e01E864mHAh1Vy6xn");
</script>
</head>

<body class="bg-[#f8fafc] min-h-screen p-4">

<div class="max-w-xl mx-auto bg-white rounded-2xl shadow-2xl p-8 mt-10">

<header class="text-center mb-8">
<a href="index.html" class="text-green-600 flex items-center justify-center gap-1 mb-2 text-sm">
<i data-lucide="arrow-left" size="14"></i> Back to Home
</a>
<h1 class="text-2xl font-bold text-gray-800">Become a Verified Donor</h1>
<p class="text-gray-500 text-sm">Email OTP verification is required to prevent fake entries</p>
</header>

<form id="donorForm" class="space-y-5">

<input type="text" id="fullName"
placeholder="Full Name"
required
class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-green-500">

<input type="tel" id="phone"
placeholder="10-digit Mobile Number"
required
class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-green-500">

<!-- DATE OF BIRTH -->
<input type="date"
id="dob"
required
class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-green-500">

<!-- Age error message box (hidden by default) -->
<div id="ageError" class="hidden bg-red-50 border border-red-300 text-red-700 rounded-lg p-4 text-sm">
  <p id="ageErrorMsg"></p>
</div>

<div class="grid grid-cols-2 gap-4">

<select id="bloodGroup" class="p-3 border rounded-lg outline-none">
<option>O+</option>
<option>O-</option>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>AB-</option>
</select>

<select id="city" class="p-3 border rounded-lg outline-none">
<option>Hyderabad</option>
<option>Warangal</option>
<option>Karimnagar</option>
<option>Nizamabad</option>
<option>Khammam</option>
<option>Mahabubnagar</option>
<option>Nalgonda</option>
<option>Adilabad</option>
</select>

</div>

<div class="border-t pt-5">

<label class="block text-sm font-bold text-gray-700 mb-2">
Email Verification
</label>

<div class="flex gap-2">

<input type="email"
id="email"
placeholder="yourname@gmail.com"
required
class="flex-1 p-3 border rounded-lg outline-none">

<button type="button"
id="sendOtpBtn"
class="bg-blue-600 text-white px-4 rounded-lg text-xs font-bold uppercase">
Send OTP
</button>

</div>

<div id="otpBox" class="hidden mt-4">

<div class="flex gap-2">

<input type="text"
id="otpInput"
placeholder="Enter 6-digit Code"
class="flex-1 p-3 border-2 border-blue-400 rounded-lg text-center font-bold">

<button type="button"
id="verifyBtn"
class="bg-green-600 text-white px-6 rounded-lg font-bold">
Verify
</button>

</div>

</div>

</div>

<button type="submit"
id="submitBtn"
disabled
class="w-full bg-gray-400 text-white py-4 rounded-xl font-bold cursor-not-allowed mt-6">
Register as Verified Donor
</button>

</form>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyD9qUADNpQwX5iFp_qELRSGhHFswi-NoBc",
authDomain: "life-saver-be5cf.firebaseapp.com",
databaseURL: "https://life-saver-be5cf-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "life-saver-be5cf",
storageBucket: "life-saver-be5cf.firebasestorage.app",
messagingSenderId: "549675407162",
appId: "1:549675407162:web:ba3c8878834cb4123ba203"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let generatedOTP;
let isVerified = false;

/* LIVE AGE CHECK ON DOB CHANGE */
document.getElementById('dob').addEventListener('change', function () {
  const dobVal = this.value;
  if (!dobVal) return;

  const birthDate = new Date(dobVal);
  const today = new Date();
  let age = today.getFullYear() - birthDate.getFullYear();
  const monthDiff = today.getMonth() - birthDate.getMonth();
  if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthDate.getDate())) {
    age--;
  }

  const ageError = document.getElementById('ageError');
  const ageErrorMsg = document.getElementById('ageErrorMsg');

  if (age < 18) {
    const yearsLeft = 18 - age;

    // Calculate exact eligible month & year
    const eligibleDate = new Date(birthDate);
    eligibleDate.setFullYear(eligibleDate.getFullYear() + 18);
    const eligibleMonth = eligibleDate.toLocaleString('default', { month: 'long' });
    const eligibleYear = eligibleDate.getFullYear();

    const yearWord = yearsLeft === 1 ? 'year' : 'years';

    ageErrorMsg.innerHTML = `
      ⚠️ You are <strong>not eligible yet</strong> to donate blood.<br><br>
      You need to wait <strong>${yearsLeft} more ${yearWord}</strong>.<br>
      You will be eligible from <strong>${eligibleMonth} ${eligibleYear}</strong>.<br><br>
      🩸 Thank you for your willingness to save lives!
    `;
    ageError.classList.remove('hidden');
  } else {
    ageError.classList.add('hidden');
  }
});

/* SEND OTP */
document.getElementById('sendOtpBtn').addEventListener('click', function () {

const email = document.getElementById('email').value;
const name = document.getElementById('fullName').value;

if (!email || !name) {
alert("Enter Name and Email First");
return;
}

generatedOTP = Math.floor(100000 + Math.random() * 900000);

const params = {
user_name: name,
user_email: email,
otp_code: generatedOTP
};

this.innerText = "Sending...";

emailjs.send("service_5z0f2my", "template_k4pl15w", params)
.then(() => {
alert("OTP Sent Successfully");
document.getElementById('otpBox').classList.remove('hidden');
this.innerText = "Resend OTP";
})
.catch(error => {
alert("Email Error: " + error.text);
this.innerText = "Send OTP";
});
});

/* VERIFY OTP */
document.getElementById('verifyBtn').addEventListener('click', function () {

const enteredOtp = document.getElementById('otpInput').value;

if (enteredOtp == generatedOTP) {

isVerified = true;
alert("Verification Successful");

const submitBtn = document.getElementById('submitBtn');
submitBtn.disabled = false;
submitBtn.classList.remove('bg-gray-400','cursor-not-allowed');
submitBtn.classList.add('bg-green-600');

document.getElementById('otpBox').classList.add('hidden');
document.getElementById('email').readOnly = true;
document.getElementById('sendOtpBtn').disabled = true;

}
else {
alert("Invalid OTP");
}

});

/* SUBMIT */
document.getElementById('donorForm').addEventListener('submit', function (e) {

e.preventDefault();

if (!isVerified) {
alert("Please verify OTP first");
return;
}

/* AGE VALIDATION */
const dob = document.getElementById('dob').value;
const birthDate = new Date(dob);
const today = new Date();

let age = today.getFullYear() - birthDate.getFullYear();
const monthDiff = today.getMonth() - birthDate.getMonth();

if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthDate.getDate())) {
age--;
}

if (age < 18) {
  const yearsLeft = 18 - age;
  const eligibleDate = new Date(birthDate);
  eligibleDate.setFullYear(eligibleDate.getFullYear() + 18);
  const eligibleMonth = eligibleDate.toLocaleString('default', { month: 'long' });
  const eligibleYear = eligibleDate.getFullYear();
  const yearWord = yearsLeft === 1 ? 'year' : 'years';

  alert(`You are not eligible yet!\n\nPlease wait ${yearsLeft} more ${yearWord} (until ${eligibleMonth} ${eligibleYear}) to register as a blood donor.\n\n🩸 Thank you for your willingness to save lives!`);
  return;
}

const donorData = {
name: document.getElementById('fullName').value,
phone: document.getElementById('phone').value,
dob: document.getElementById('dob').value,
bloodGroup: document.getElementById('bloodGroup').value,
city: document.getElementById('city').value,
email: document.getElementById('email').value,
status: "Available",
verified: "Email",
timestamp: new Date().toISOString()
};

push(ref(db, 'donors'), donorData)
.then(() => {
alert("Registration Complete");
window.location.href = "index.html";
});

});

lucide.createIcons();

</script>

</body>
</html>
